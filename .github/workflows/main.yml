name: CI/CD Pipeline

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0.37
        env:
          MYSQL_ROOT_PASSWORD: 123456
          MYSQL_DATABASE: news
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

      redis:
        image: redis/redis-stack:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Run unit tests (if any)
        if: hashFiles('tests/unit/test_*.py') != ''
        run: |
          pytest tests/unit/ -v --cov=app --cov-report=xml

      - name: Run integration tests (if any)
        if: hashFiles('tests/integration/test_*.py') != ''
        run: |
          pytest tests/integration/ -v --alluredir=./allure-results
        env:
          MYSQL_HOST: localhost
          MYSQL_PORT: 3306
          MYSQL_PASSWORD: 123456
          REDIS_HOST: localhost
          LLM_API_MOCK: true

      - name: Upload Allure results
        if: always() && hashFiles('./allure-results') != ''
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: ./allure-results
          retention-days: 7

  # 部署 job 可以暂时注释掉，因为还没到部署阶段
  # deploy:
  #   ...