# .github/workflows/flask-app.yml
name: Flask App CI/CD

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    name: 测试 Flask 应用
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: [ 3.9, 3.10, 3.11 ]

    services:
      mysql:
        image: mysql:8.0.37
        env:
          MYSQL_ROOT_PASSWORD: 123456
          MYSQL_DATABASE: news
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

      redis:
        image: redis/redis-stack:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          # 确保测试工具和 allure 插件已安装
          pip install pytest pytest-cov allure-pytest coverage

      - name: Run database migrations
        run: python manage.py migrate
        env:
          DATABASE_URL: mysql://root:123456@localhost:3306/news

      - name: Run tests with coverage & Allure
        run: |
          pytest tests/ -v \
            --cov=. \
            --cov-report=xml \
            --alluredir=./allure-results
        env:
          DATABASE_URL: mysql://root:123456@localhost:3306/news
          MYSQL_HOST: localhost
          MYSQL_PORT: 3306
          MYSQL_PASSWORD: 123456
          REDIS_HOST: localhost
          LLM_API_MOCK: true

      - name: Upload coverage report to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.python-version }}
          path: ./allure-results
          retention-days: 7
          if-no-files-found: warn

